<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip to Zurich 2025</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        p {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        
        h2 {
            font-size: 1.5rem;
            margin: 2rem 0 1rem 0;
        }
        
        #alps-static-map {
            width: 100%;
            max-width: 700px;
            height: auto;
            margin-top: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 2px 2px 8px #eee;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            h2 {
                font-size: 1.25rem;
                margin: 1.5rem 0 0.75rem 0;
            }
            
            p {
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            h1 {
                font-size: 1.25rem;
            }
            
            h2 {
                font-size: 1.1rem;
            }
            
            p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <h1>Trip to Zurich 2025</h1>
    <p>Details about the upcoming trip to Zurich in 2025 will be available soon.</p>
    <h2>Alps Region Map</h2>
    <img id="alps-static-map" src="{{ url_for('static', filename='images/trips/aug25/map_switzerland_area.jfif') }}" alt="Map from Turin to Zurich" />
</body>
</html>
